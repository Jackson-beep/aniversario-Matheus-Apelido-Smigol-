<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surpresa 🎉</title>

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: url('Foto de 💥_---Mateus 🤨🤔🫠---_💥(1).jpg') no-repeat center center/cover;
        height: 100vh;
    }

    /* Confetes */
    .confete {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: red;
        animation: cair 5s linear infinite;
    }

    @keyframes cair {
        0% { transform: translateY(-10vh); }
        100% { transform: translateY(110vh); }
    }

    /* Imagem piscando */
    .smigol {
        position: absolute;
        width: 80px;
        opacity: 0;
        animation: piscar 5s infinite;
    }

    @keyframes piscar {
        0%, 100% { opacity: 0; }
        50% { opacity: 1; }
    }

    /* Botão central */
    .botao {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 20px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background-color: #ff4081;
        color: white;
        cursor: pointer;
    }

    /* Container dos participantes */
    
    .participantes {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

/* grid dos 4 participantes */
.grid {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

/* cards normais */
.card {
    width: 40%;
    padding: 15px;
    text-align: center;
    color: white;
    font-weight: bold;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    text-decoration: none;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* botão final */
.final {
    width: 80%;
    padding: 20px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: white;
    text-decoration: none;

    border-radius: 15px;

    background: linear-gradient(45deg, #ff0000, #ff4081, #ff0000);
    background-size: 200%;

    animation: brilho 2s infinite;

    box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
    transition: 0.3s;
}

/* animação chamativa */
@keyframes brilho {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

/* efeito hover */
.final:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px red, 0 0 50px #ff4081;
}

    /* Tela do susto */
    #telaSusto {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        background: black;
        justify-content: center;
        align-items: center;
    }

    #telaSusto img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

</style>
</head>

<body>

<!-- Música de fundo -->
<audio src="fundoindex.mp3" autoplay loop></audio>

<!-- Botão -->
<button class="botao" onclick="ativarSusto()">CLIQUE AQUI 😈</button>

<!-- Participantes -->
<div class="participantes">

    <div class="grid">
        <a href="Primo.html" class="card">Primo o Gay desfarçado de boiola</a>
        <a href="Vitor.html" class="card">Vitor Vitorugo Verruga</a>
        <a href="Razi.html" class="card">Razzi Ramada Autralia hooo My Goood!!!!</a>
        <a href="namoradaSmigol.html" class="card">!!!--Lest rock--!!!</a>
    </div>

    <a href="The Last Dance.html" class="final">🔥 THE LAST DANCE 🔥</a>

</div>

<!-- Tela do susto -->
<div id="telaSusto">
    <img src="gif-20260328-173457.gif">
    <audio id="audioSusto" src="foxy jumpscare  fnaf 2(MP3_160K).mp3"></audio>
</div>

<script>
    // Criar confetes
    for (let i = 0; i < 50; i++) {
        let confete = document.createElement('div');
        confete.classList.add('confete');
        confete.style.left = Math.random() * 100 + 'vw';
        confete.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        confete.style.animationDuration = (Math.random()*3 + 2) + 's';
        document.body.appendChild(confete);
    }

   // Lista de imagens (adicione quantas quiser)
const imagens = [
    "Foto de 💥_---Mateus 🤨🤔🫠---_💥(2).jpg",
    "Smigol FDP.jpg",
    "Foto de 💥_---Mateus 🤨🤔🫠---_💥.jpg"
];

// Smigol piscando com imagens aleatórias
setInterval(() => {
    let img = document.createElement('img');

    // Escolhe imagem aleatória
    let randomImg = imagens[Math.floor(Math.random() * imagens.length)];
    img.src = randomImg;

    img.classList.add('smigol');

    img.style.top = Math.random() * 80 + '%';
    img.style.left = Math.random() * 80 + '%';

    document.body.appendChild(img);

    setTimeout(() => {
        img.remove();
    }, 4000);

}, 3000);

    // Função do susto
    function ativarSusto() {
    let tela = document.getElementById("telaSusto");
    let audio = document.getElementById("audioSusto");
    let gif = tela.querySelector("img");

    tela.style.display = "flex";

    // reinicia o GIF (força replay)
    let src = gif.src;
    gif.src = "";
    gif.src = src;

    audio.currentTime = 0;
    audio.play();

    // quando o áudio acabar → volta ao normal
    audio.onended = () => {
        tela.style.display = "none";
    };
}
</script>

</body>
</html>
